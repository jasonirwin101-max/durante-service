<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,Helvetica,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:20px 0;">
<tr><td align="center">
<table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:8px;overflow:hidden;">
  <tr><td style="background:#E31837;padding:20px 30px;">
    <h1 style="color:#ffffff;margin:0;font-size:22px;">Durante Equipment</h1>
    <p style="color:#ffffff;margin:4px 0 0;font-size:13px;">Customer Feedback Received</p>
  </td></tr>
  <tr><td style="padding:30px;">
    <h2 style="color:#1A1A1A;margin:0 0 15px;">Rating Received — {{SR_ID}}</h2>
    <div style="text-align:center;margin:20px 0;">
      <p style="font-size:36px;margin:0;letter-spacing:4px;">{{STARS}}</p>
      <p style="font-size:18px;font-weight:bold;color:#1A1A1A;margin:8px 0 0;">{{RATING}}/5</p>
    </div>
    <table style="width:100%;border-collapse:collapse;margin:20px 0;">
      <tr><td style="padding:8px 12px;background:#f9f9f9;font-weight:bold;width:140px;">SR Number</td><td style="padding:8px 12px;background:#f9f9f9;">{{SR_ID}}</td></tr>
      <tr><td style="padding:8px 12px;font-weight:bold;">Company</td><td style="padding:8px 12px;">{{COMPANY_NAME}}</td></tr>
      <tr><td style="padding:8px 12px;background:#f9f9f9;font-weight:bold;">Customer</td><td style="padding:8px 12px;background:#f9f9f9;">{{CONTACT_NAME}}</td></tr>
      <tr><td style="padding:8px 12px;font-weight:bold;">Equipment</td><td style="padding:8px 12px;">{{EQUIPMENT}}</td></tr>
      <tr><td style="padding:8px 12px;background:#f9f9f9;font-weight:bold;">Technician</td><td style="padding:8px 12px;background:#f9f9f9;">{{TECH_NAME}}</td></tr>
      <tr><td style="padding:8px 12px;font-weight:bold;">Rated On</td><td style="padding:8px 12px;">{{RATED_ON}}</td></tr>
      {{COMMENTS_ROW}}
    </table>
  </td></tr>
  <tr><td style="background:#1A1A1A;padding:15px 30px;text-align:center;">
    <p style="color:#999;margin:0;font-size:12px;">&copy; Durante Equipment &bull; Hollywood, FL</p>
  </td></tr>
</table>
</td></tr></table>
</body>
</html>
